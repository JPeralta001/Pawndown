<!DOCTYPE html>

    <title>Galería - PawnDown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/galeria.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="Index.html" class="nav-logo">
                    <img src="https://ext.same-assets.com/1363858620/2857939221.png" alt="PawnDown Logo" class="logo-img">
                    <span class="brand-name">PawnDown</span>
                </a>
            </div>
            <button class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html#features">Atajos</a></li>
                <li><a href="index.html#about">Sobre Nosotros</a></li>
                <li><a href="index.html#contact">Contacto</a></li>
            </ul>

        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Galería de Fotos</h1>
            <p class="hero-subtitle">Revive los mejores momentos de nuestros torneos y eventos del Grand Prix en Ensenada, Baja California.</p>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="filter-section">
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <!-- <button class="filter-btn" data-filter="torneos">Torneos</button>-->
            <!-- <button class="filter-btn" data-filter="simultaneas">Simultáneas</button>-->
            <!-- <button class="filter-btn" data-filter="premiaciones">Premiaciones</button>-->
            <!-- <button class="filter-btn" data-filter="talleres">Talleres</button>-->
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section">
        <div class="gallery-grid" id="galleryGrid">
            <!-- Images will be generated by JavaScript -->
        </div>
    </section>

    <!-- Load More Button -->
    <section class="load-more-section">
        <button class="load-more-btn" id="loadMoreBtn">
            <span>Cargar más fotos</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
    </section>

    <!-- Footer -->
    <footer class="footer">

                <a href="#" class="social-link">

                </a>
                <a href="#" class="social-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>

            <p class="copyright">© 2026 José Alberto Peralta Escobedo. Todos los derechos reservados.</p>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <button class="lightbox-nav lightbox-next" id="lightboxNext">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>

        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImage" class="lightbox-image">
            <div class="lightbox-info">
                <h3 class="lightbox-title" id="lightboxTitle"></h3>
                <p class="lightbox-description" id="lightboxDescription"></p>
                <span class="lightbox-date" id="lightboxDate"></span>
            </div>
        </div>
    </div>

    <script type="module" src="js/galeria.js"></script>
